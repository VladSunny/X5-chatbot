services:
  - type: web
    name: fastapi-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r web/back/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    autoDeploy: true
    envVars:
      - key: TRANSFORMERS_CACHE
        value: /opt/render/.cache/huggingface
    rootDir: web/back
